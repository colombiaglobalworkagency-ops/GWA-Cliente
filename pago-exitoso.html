<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <title>Pago exitoso — GWA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Montserrat, sans-serif;
      background: #f9fafb; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 30px; text-align: center;
    }
    .icon {
      width: 80px; height: 80px; background: #16a34a; border-radius: 50%;
      color: #fff; font-size: 36px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards;
    }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #111; }
    p  { font-size: 14px; color: #6b7280; line-height: 1.6; max-width: 300px; margin: 0 auto 32px; }
    a  {
      display: block; width: 100%; max-width: 300px; padding: 16px;
      background: #111; color: #fff; border-radius: 50px;
      font-size: 15px; font-weight: 700; text-decoration: none;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="icon">✓</div>
  <h1>¡Pago recibido!</h1>
  <p>Tu pago fue procesado exitosamente. En unos minutos tu proceso quedará activo y podrás verlo desde la app.</p>
  <a href="index.html">Ver mi proceso →</a>
</body>
</html>
